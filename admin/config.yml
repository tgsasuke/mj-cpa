    label: "稅法雜記"
    folder: "src/content/blog"
    create: true
    slug: "{{category}}-{{year}}{{month}}{{day}}-{{hour}}{{minute}}{{second}}-{{slug}}"
    filter: { field: "category", value: "tax-notes" }
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "發布日期", name: "date", widget: "datetime" }
      - { label: "文章類型", name: "category", widget: "hidden", default: "tax-notes" }
      - { label: "封面圖片", name: "thumbnail", widget: "image", required: false }
      - { label: "內容", name: "body", widget: "markdown" }

  # 4. 公司法與勞動法雜記
  - name: "law_notes_posts"
    label: "公司法與勞動法雜記"
