backend:
  name: test-repo

local_backend:
  url: http://localhost:5173/api/v1

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "所有文章"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "發布日期", name: "date", widget: "datetime" }
      - label: "文章類型"
        name: "category"
        widget: "select"
        options:
          - { label: "讀書雜記", value: "reading" }
          - { label: "最近稅法規定與新聞", value: "tax-news" }
          - { label: "稅法雜記", value: "tax-notes" }
          - { label: "公司法與勞動法雜記", value: "law-notes" }
      - { label: "封面圖片", name: "thumbnail", widget: "image", required: false }
      - { label: "內容", name: "body", widget: "markdown" }